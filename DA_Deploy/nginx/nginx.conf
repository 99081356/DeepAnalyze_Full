# =============================================================================
# DeepAnalyze Hub - nginx 反向代理（可选，内网自签 TLS 终止）
# =============================================================================
# 适用场景：
#   - 内网部署但希望统一 HTTPS 入口（自签证书）
#   - 多服务共用 80/443 端口
#   - 需要额外的安全 headers / 限速
#
# 默认内网 HTTP 直连 22000 端口即可，本配置是「可选增强」。
#
# 用法：
#   1. 生成自签证书：
#        openssl req -x509 -newkey rsa:2048 -nodes -days 3650 \
#          -keyout hub.key -out hub.crt -subj "/CN=hub.internal"
#   2. 把本文件 + 证书挂进 nginx 容器，或装在宿主 nginx 上
#   3. docker compose up（建议放独立 nginx 服务或宿主 nginx）
# =============================================================================

upstream da_hub_backend {
    server 127.0.0.1:22000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;
    # 强制跳转 HTTPS（如启用 TLS）
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    # ── TLS 证书（替换为实际路径）─────────────────────────────────────────
    ssl_certificate     /etc/nginx/certs/hub.crt;
    ssl_certificate_key /etc/nginx/certs/hub.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── 安全 headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ── 请求体限制（Hub 上传 skill / bundle / model）─────────────────────
    client_max_body_size 1024m;

    # ── 反向代理 ──────────────────────────────────────────────────────────
    location / {
        proxy_pass http://da_hub_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # SSE / 长连接（部署进度、日志流）
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # 健康检查走短超时
    location = /api/health {
        proxy_pass http://da_hub_backend;
        access_log off;
    }
}
