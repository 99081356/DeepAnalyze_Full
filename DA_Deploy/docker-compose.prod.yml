# =============================================================================
# DeepAnalyze Hub - 生产环境 Compose（local Docker 部署模式）
# =============================================================================
# 部署模式：Hub 与 Worker 同机。Hub 通过挂载的 docker.sock 在本机拉起 worker 容器。
#
# 用法：
#   1. 先 docker load 4 个镜像（hub / postgres / worker / worker-pg）
#      bash DA_Deploy/offline/load-images.sh DA_Deploy/images/
#   2. cp .env.production.example .env，填入密钥
#      （或直接运行 scripts/generate-secrets.sh 自动生成）
#   3. docker compose -f docker-compose.prod.yml up -d
#   4. 浏览器访问 http://<host>:22000，admin 登录后通过控制台部署 worker
#
# 升级 / 备份 / 恢复：见 scripts/ 目录与 README.md
# =============================================================================

name: da-hub

services:
  postgres:
    image: postgres:16-alpine
    container_name: da-hub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PG_DATABASE:-deepanalyze_hub}
      POSTGRES_USER: ${PG_USER:-deepanalyze_hub}
      POSTGRES_PASSWORD: ${PG_PASSWORD:?必须在 .env 中设置 PG_PASSWORD}
    volumes:
      - hub-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-deepanalyze_hub} -d ${PG_DATABASE:-deepanalyze_hub}"]
      interval: 10s
      timeout: 5s
      retries: 5
    shm_size: 256m
    # 仅在内网调试需要直连 PG 时打开；正式部署保持注释
    # ports:
    #   - "5433:5432"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 1g

  hub:
    image: ${HUB_IMAGE:-deepanalyze-hub:latest}
    # 若无预构建镜像、需要在本机构建，注释上一行并取消下一行注释：
    # build:
    #   context: ..
    #   dockerfile: Dockerfile
    container_name: da-hub
    restart: unless-stopped
    ports:
      - "${PORT:-22000}:22000"
    environment:
      PORT: 22000
      NODE_ENV: production
      # ── PostgreSQL（Hub 自己的关系数据库）──────────────────
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DATABASE: ${PG_DATABASE:-deepanalyze_hub}
      PG_USER: ${PG_USER:-deepanalyze_hub}
      PG_PASSWORD: ${PG_PASSWORD:?必须在 .env 中设置 PG_PASSWORD}
      # ── JWT / Auth ──────────────────────────────────────────
      JWT_SECRET: ${JWT_SECRET:?必须在 .env 中设置 JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?必须在 .env 中设置 JWT_REFRESH_SECRET}
      JWT_EXPIRY: ${JWT_EXPIRY:-7d}
      WORKER_TOKEN_EXPIRY: ${WORKER_TOKEN_EXPIRY:-30d}
      HUB_JOIN_TOKEN_EXPIRY: ${HUB_JOIN_TOKEN_EXPIRY:-24h}
      HUB_JOIN_TOKEN_MAX: ${HUB_JOIN_TOKEN_MAX:-100}
      HUB_JWT_KEY_ID: ${HUB_JWT_KEY_ID:-hub-rs256-v1}
      # RSA 密钥挂载进容器（由 generate-secrets.sh 生成）
      HUB_JWT_PUBLIC_KEY_PATH: /app/data/keys/pub.pem
      HUB_JWT_PRIVATE_KEY_PATH: /app/data/keys/priv.pem
      # ── 初始管理员密码 ─────────────────────────────────────
      # 生产环境必须设置强密码；migration 008 用此值 seed admin 账号
      ADMIN_INIT_PASSWORD: ${ADMIN_INIT_PASSWORD:?必须在 .env 中设置 ADMIN_INIT_PASSWORD}
      # ── 外部访问 URL ───────────────────────────────────────
      # DA Worker 用此 URL 回访 Hub（拉 bundle / 验 SSO ticket）
      HUB_EXTERNAL_URL: ${HUB_EXTERNAL_URL:?必须在 .env 中设置 HUB_EXTERNAL_URL}
      # ── 数据加密 / SSH ─────────────────────────────────────
      HUB_DATA_KEY: ${HUB_DATA_KEY:?必须在 .env 中设置 HUB_DATA_KEY}
      HUB_SSH_DEFAULT_PORT: ${HUB_SSH_DEFAULT_PORT:-22}
      HUB_SSH_TIMEOUT: ${HUB_SSH_TIMEOUT:-60000}
      # ── Local Docker 模式：worker 容器镜像 ─────────────────
      # Hub 通过 docker.sock 在本机拉起 worker 时用的镜像名
      # 必须已 docker load 到本机（默认 deepanalyze/da:latest + pgvector/pgvector:pg16）
      HUB_DA_IMAGE: ${HUB_DA_IMAGE:-deepanalyze/da:latest}
      HUB_DA_PG_IMAGE: ${HUB_DA_PG_IMAGE:-pgvector/pgvector:pg16}
      # Worker 容器对外可达的宿主机地址（写 workers.da_url 用）。
      # 跨容器/跨机访问 worker 必须用真实 IP（如 192.168.1.6），不能用 localhost。
      # 留空 fallback localhost（仅浏览器同机场景）。
      HUB_DA_HOST: ${HUB_DA_HOST:-localhost}
      # ── 存储 / 备份 ────────────────────────────────────────
      HUB_MODEL_REPO_DIR: /app/data/model-repo
      HUB_MODEL_MAX_SIZE: ${HUB_MODEL_MAX_SIZE:-5368709120}
      HUB_BUNDLE_IMAGES_DIR: /app/data/bundle/images
      HUB_BUNDLE_DIR: /app/data/bundle
      HUB_BACKUP_DIR: /app/data/backups
      HUB_BACKUP_RETENTION_DAYS: ${HUB_BACKUP_RETENTION_DAYS:-30}
      HUB_DOCKER_REGISTRY: ${HUB_DOCKER_REGISTRY:-}
    volumes:
      - hub-data:/app/data
      # ── Local Docker 部署模式必需：让 hub 容器内 docker CLI 能访问宿主 daemon ──
      # Hub 通过它在控制台调 /api/v1/deploy，在本机拉起 da-app-* + da-pg-* worker 容器。
      # 部署前请确保 worker / worker-pg 镜像已 docker load 到本机。
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:22000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"
    deploy:
      resources:
        limits:
          memory: 2g

volumes:
  hub-pgdata:
    name: da-hub-pgdata
  hub-data:
    name: da-hub-data
